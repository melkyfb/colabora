[alembic]
script_location = alembic
prepend_sys_path = .
# url real vem de app.config.settings.DATABASE_URL (ver alembic/env.py). Este e fallback.
sqlalchemy.url = mysql+aiomysql://nyx:nyx_dev_pw@localhost:3306/nyx

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
